; ===================================================================
; Hantuin-v2 — PHP Configuration (CGI / mod_php fallback)
; Place: public_html/php.ini
; Same settings as .user.ini — covers both PHP-FPM and CGI handlers
; ===================================================================

; ── Security ───────────────────────────────────────────────────────
expose_php                  = Off
display_errors              = Off
display_startup_errors      = Off
log_errors                  = On
error_reporting             = E_ALL & ~E_DEPRECATED & ~E_STRICT
html_errors                 = Off

; ── Session Security ───────────────────────────────────────────────
session.use_strict_mode     = 1
session.use_only_cookies    = 1
session.cookie_secure       = 1
session.cookie_httponly     = 1
session.cookie_samesite     = Strict
session.gc_maxlifetime      = 3600
session.gc_probability      = 1
session.gc_divisor          = 100

; ── Upload / Request Limits ────────────────────────────────────────
upload_max_filesize         = 8M
post_max_size               = 10M
max_execution_time          = 30
max_input_time              = 30
max_input_vars              = 1000
memory_limit                = 128M

; ── Output ─────────────────────────────────────────────────────────
output_buffering            = Off
zlib.output_compression     = On
zlib.output_compression_level = 6

; ── APCu In-Process Cache ──────────────────────────────────────────
; Fallback when Redis/Memcached are unavailable.
apc.enabled                 = 1
apc.shm_size                = 32M
apc.ttl                     = 7200
apc.gc_ttl                  = 3600
apc.enable_cli              = 0

; ── Redis / Memcached ───────────────────────────────────────────────
; Connection configured via .env (CACHE_DRIVER, REDIS_HOST, etc.)
; No php.ini directives needed — handled by Cache::setupRedis/Memcached()
