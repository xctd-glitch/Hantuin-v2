; ===================================================================
; Hantuin-v2 — PHP Per-Directory Configuration (PHP-FPM / FastCGI)
; Place: public_html/.user.ini
; Reload: touch public_html/index.php  (PHP-FPM picks up within 5 min)
; ===================================================================

; ── Security ───────────────────────────────────────────────────────
expose_php                  = Off
display_errors              = Off
display_startup_errors      = Off
log_errors                  = On
error_reporting             = E_ALL & ~E_DEPRECATED & ~E_STRICT
html_errors                 = Off

; ── Session Security ───────────────────────────────────────────────
; App also sets these via ini_set() in Session::start() — belt+suspenders
session.use_strict_mode     = 1
session.use_only_cookies    = 1
session.cookie_secure       = 1
session.cookie_httponly     = 1
session.cookie_samesite     = Strict
session.gc_maxlifetime      = 3600
session.gc_probability      = 1
session.gc_divisor          = 100

; ── Upload / Request Limits ────────────────────────────────────────
upload_max_filesize         = 8M
post_max_size               = 10M
max_execution_time          = 30
max_input_time              = 30
max_input_vars              = 1000
memory_limit                = 128M

; ── Output ─────────────────────────────────────────────────────────
output_buffering            = Off
zlib.output_compression     = On
zlib.output_compression_level = 6

; ── APCu In-Process Cache ──────────────────────────────────────────
; Fallback when Redis/Memcached are unavailable. (php -m | grep apcu)
apc.enabled                 = 1
apc.shm_size                = 32M
apc.ttl                     = 7200
apc.gc_ttl                  = 3600
apc.enable_cli              = 0

; ── Redis Extension ─────────────────────────────────────────────────
; Primary shared cache when CACHE_DRIVER=redis (php -m | grep redis)
; No php.ini knobs needed here — connection is managed by Cache::setupRedis()

; ── Memcached Extension ─────────────────────────────────────────────
; Alternative shared cache when CACHE_DRIVER=memcached (php -m | grep memcached)
; No php.ini knobs needed here — connection is managed by Cache::setupMemcached()
